<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embryo Selection — The Bonna Algorithm</title>
  <link rel="stylesheet" href="styles/global.css">
  <style>
    :root {
      --layer-1: #FF6B8A;
      --layer-2: #7DD3FC;
      --layer-3: #9B7DFF;
      --layer-4: #4ADE80;
      --layer-5: #FBBF24;
      --layer-6: #22D3EE;
      --layer-7: #F472B6;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, var(--bg-deep) 60%, transparent);
      pointer-events: none;
    }
    .header > * { pointer-events: auto; }
    .header-title {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .header-title span { color: var(--text-secondary); }
    .stage-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--text-muted);
      color: var(--text-secondary);
      transition: all 0.6s var(--ease-out-expo);
    }

    .viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .viewport iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s var(--ease-out-expo);
    }
    .viewport iframe.active {
      opacity: 1;
      z-index: 1;
    }

    .timeline {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--timeline-height);
      background: var(--bg-surface);
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: stretch;
      z-index: 100;
      padding: 0 1rem;
    }

    .tl-segment {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      padding: 0.5rem 0.25rem;
      transition: all 0.4s var(--ease-out-expo);
      user-select: none;
    }
    .tl-segment:hover { background: var(--bg-hover); }

    .tl-number {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
      transition: color 0.4s;
    }
    .tl-icon {
      width: 20px;
      height: 20px;
      margin-bottom: 0.25rem;
      opacity: 0.35;
      transition: all 0.4s var(--ease-out-expo);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .tl-label {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-align: center;
      transition: color 0.4s;
      white-space: nowrap;
    }

    .tl-segment.active .tl-icon { opacity: 1; }
    .tl-segment.active .tl-number { font-weight: 700; }

    .tl-progress {
      position: absolute;
      bottom: 0;
      left: 8px;
      right: 8px;
      height: 2px;
      background: var(--text-muted);
      border-radius: 1px;
      opacity: 0.2;
    }
    .tl-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 1px;
      transition: width 0.3s var(--ease-out-expo);
    }

    .tl-segment[data-layer="1"].active .tl-number,
    .tl-segment[data-layer="1"].active .tl-label,
    .tl-segment[data-layer="1"].active .tl-icon { color: var(--layer-1); }
    .tl-segment[data-layer="1"] .tl-progress-fill { background: var(--layer-1); }

    .tl-segment[data-layer="2"].active .tl-number,
    .tl-segment[data-layer="2"].active .tl-label,
    .tl-segment[data-layer="2"].active .tl-icon { color: var(--layer-2); }
    .tl-segment[data-layer="2"] .tl-progress-fill { background: var(--layer-2); }

    .tl-segment[data-layer="3"].active .tl-number,
    .tl-segment[data-layer="3"].active .tl-label,
    .tl-segment[data-layer="3"].active .tl-icon { color: var(--layer-3); }
    .tl-segment[data-layer="3"] .tl-progress-fill { background: var(--layer-3); }

    .tl-segment[data-layer="4"].active .tl-number,
    .tl-segment[data-layer="4"].active .tl-label,
    .tl-segment[data-layer="4"].active .tl-icon { color: var(--layer-4); }
    .tl-segment[data-layer="4"] .tl-progress-fill { background: var(--layer-4); }

    .tl-segment[data-layer="5"].active .tl-number,
    .tl-segment[data-layer="5"].active .tl-label,
    .tl-segment[data-layer="5"].active .tl-icon { color: var(--layer-5); }
    .tl-segment[data-layer="5"] .tl-progress-fill { background: var(--layer-5); }

    .tl-segment[data-layer="6"].active .tl-number,
    .tl-segment[data-layer="6"].active .tl-label,
    .tl-segment[data-layer="6"].active .tl-icon { color: var(--layer-6); }
    .tl-segment[data-layer="6"] .tl-progress-fill { background: var(--layer-6); }

    .tl-segment[data-layer="7"].active .tl-number,
    .tl-segment[data-layer="7"].active .tl-label,
    .tl-segment[data-layer="7"].active .tl-icon { color: var(--layer-7); }
    .tl-segment[data-layer="7"] .tl-progress-fill { background: var(--layer-7); }

    .tl-segment[data-layer="1"].active { box-shadow: inset 0 2px 0 0 var(--layer-1); }
    .tl-segment[data-layer="2"].active { box-shadow: inset 0 2px 0 0 var(--layer-2); }
    .tl-segment[data-layer="3"].active { box-shadow: inset 0 2px 0 0 var(--layer-3); }
    .tl-segment[data-layer="4"].active { box-shadow: inset 0 2px 0 0 var(--layer-4); }
    .tl-segment[data-layer="5"].active { box-shadow: inset 0 2px 0 0 var(--layer-5); }
    .tl-segment[data-layer="6"].active { box-shadow: inset 0 2px 0 0 var(--layer-6); }
    .tl-segment[data-layer="7"].active { box-shadow: inset 0 2px 0 0 var(--layer-7); }

    .key-hints {
      position: fixed;
      bottom: calc(var(--timeline-height) + 12px);
      right: 16px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.75rem;
      z-index: 100;
      opacity: 0.5;
    }
    .key-hints kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--text-muted);
      border-radius: 3px;
      margin-right: 0.25rem;
      font-size: 0.55rem;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">Embryo Selection <span>— The Bonna Algorithm</span></div>
    <div class="stage-badge" id="stageBadge">STAGE 1 / 7</div>
  </header>

  <main class="viewport" id="viewport"></main>

  <nav class="timeline" id="timeline">
    <div class="tl-segment" data-layer="1" data-src="modules/01-the-problem.html">
      <span class="tl-number">01</span>
      <span class="tl-icon">⚠</span>
      <span class="tl-label">The Problem</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
    <div class="tl-segment" data-layer="2" data-src="modules/02-doodle-segmentation.html">
      <span class="tl-number">02</span>
      <span class="tl-icon">🔬</span>
      <span class="tl-label">DoodleP2P</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
    <div class="tl-segment" data-layer="3" data-src="modules/03-bonna-architecture.html">
      <span class="tl-number">03</span>
      <span class="tl-icon">◆</span>
      <span class="tl-label">Architecture</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
    <div class="tl-segment" data-layer="4" data-src="modules/04-performance.html">
      <span class="tl-number">04</span>
      <span class="tl-icon">📊</span>
      <span class="tl-label">Performance</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
    <div class="tl-segment" data-layer="5" data-src="modules/05-confidence.html">
      <span class="tl-number">05</span>
      <span class="tl-icon">◎</span>
      <span class="tl-label">Confidence</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
    <div class="tl-segment" data-layer="6" data-src="modules/06-production-pipeline.html">
      <span class="tl-number">06</span>
      <span class="tl-icon">⚡</span>
      <span class="tl-label">Pipeline</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
    <div class="tl-segment" data-layer="7" data-src="modules/07-clinical-integration.html">
      <span class="tl-number">07</span>
      <span class="tl-icon">♥</span>
      <span class="tl-label">Clinical</span>
      <div class="tl-progress"><div class="tl-progress-fill"></div></div>
    </div>
  </nav>

  <div class="key-hints">
    <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate</span>
    <span><kbd>1</kbd>&ndash;<kbd>7</kbd> jump</span>
  </div>

  <script>
    const segments = document.querySelectorAll('.tl-segment');
    const viewport = document.getElementById('viewport');
    const badge = document.getElementById('stageBadge');
    const iframes = new Map();
    const TOTAL = segments.length;
    let currentLayer = 0;

    const LAYER_COLORS = [
      null,
      '--layer-1', '--layer-2', '--layer-3', '--layer-4',
      '--layer-5', '--layer-6', '--layer-7'
    ];

    function navigateTo(layerIndex) {
      if (layerIndex < 0 || layerIndex >= segments.length) return;
      currentLayer = layerIndex;
      const seg = segments[layerIndex];
      const layerNum = parseInt(seg.dataset.layer);
      const src = seg.dataset.src;

      segments.forEach(s => s.classList.remove('active'));
      seg.classList.add('active');

      badge.textContent = `STAGE ${layerNum} / ${TOTAL}`;
      const color = getComputedStyle(document.documentElement)
        .getPropertyValue(LAYER_COLORS[layerNum]).trim();
      badge.style.borderColor = color;
      badge.style.color = color;

      viewport.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

      if (iframes.has(layerIndex)) {
        iframes.get(layerIndex).classList.add('active');
      } else {
        const iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.dataset.layer = layerIndex;
        iframe.onload = () => requestAnimationFrame(() => iframe.classList.add('active'));
        viewport.appendChild(iframe);
        iframes.set(layerIndex, iframe);
      }
    }

    segments.forEach((seg, i) => seg.addEventListener('click', () => navigateTo(i)));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault(); navigateTo(currentLayer + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); navigateTo(currentLayer - 1);
      } else if (e.key >= '1' && e.key <= String(TOTAL)) {
        navigateTo(parseInt(e.key) - 1);
      }
    });

    window.addEventListener('message', (e) => {
      if (e.data?.type === 'module-progress') {
        const seg = document.querySelector(`.tl-segment[data-layer="${e.data.layer}"]`);
        if (seg) seg.querySelector('.tl-progress-fill').style.width = `${e.data.progress * 100}%`;
      }
    });

    navigateTo(0);
  </script>
</body>
</html>
